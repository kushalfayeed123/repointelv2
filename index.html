<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RepoIntel AI Assistant</title>
    <style>
      :root {
        --bg-primary: #0f172a;
        --bg-secondary: #1e293b;
        --text-main: #f8fafc;
        --text-muted: #94a3b8;
        --accent: #38bdf8;
        --accent-hover: #0ea5e9;
        --chat-user: #0369a1;
        --chat-agent: #334155;
        --border-color: #334155;
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      }

      body {
        background-color: var(--bg-primary);
        color: var(--text-main);
        display: flex;
        height: 100vh;
        overflow: hidden;
        position: relative;
      }

      /* Sidebar Panel Layout */
      .sidebar {
        width: 320px;
        background-color: var(--bg-secondary);
        border-right: 1px solid var(--border-color);
        padding: 20px;
        display: flex;
        flex-direction: column;
        gap: 20px;
        z-index: 50;
        transition: transform 0.3s ease;
      }

      h2,
      h3 {
        color: var(--accent);
        font-weight: 600;
      }

      .input-group {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }

      label {
        font-size: 0.85rem;
        color: var(--text-muted);
      }

      input[type="text"] {
        width: 100%;
        padding: 10px 14px;
        background-color: var(--bg-primary);
        border: 1px solid var(--border-color);
        border-radius: 6px;
        color: var(--text-main);
        font-size: 0.9rem;
        outline: none;
        transition: border-color 0.2s;
      }

      input[type="text"]:focus {
        border-color: var(--accent);
      }

      button {
        width: 100%;
        padding: 12px;
        background-color: var(--accent);
        color: var(--bg-primary);
        border: none;
        border-radius: 6px;
        font-weight: bold;
        font-size: 0.9rem;
        cursor: pointer;
        transition: background-color 0.2s;
      }

      button:hover {
        background-color: var(--accent-hover);
      }

      .status-box {
        background-color: var(--bg-primary);
        border: 1px solid var(--border-color);
        padding: 12px;
        border-radius: 6px;
        font-size: 0.85rem;
        word-break: break-all;
      }

      /* Main Chat Window Layout */
      .chat-container {
        flex: 1;
        display: flex;
        flex-direction: column;
        height: 100%;
        width: 80%;
      }

      .chat-header {
        padding: 15px 20px;
        background-color: var(--bg-secondary);
        border-bottom: 1px solid var(--border-color);
        display: flex;
        align-items: center;
        gap: 15px;
      }

      /* Mobile UI Hamburger Toggle Button Icon */
      .menu-toggle {
        display: none;
        background: none;
        border: 1px solid var(--border-color);
        color: var(--text-main);
        padding: 8px 12px;
        border-radius: 6px;
        cursor: pointer;
        font-size: 1.2rem;
        width: auto;
      }

      .menu-toggle:hover {
        background-color: var(--bg-primary);
      }

      .messages-viewport {
        flex: 1;
        padding: 20px;
        overflow-y: auto;
        display: flex;
        flex-direction: column;
        gap: 16px;
      }

      .message {
        max-width: 75%;
        padding: 12px 16px;
        border-radius: 8px;
        line-height: 1.5;
        font-size: 0.95rem;
        white-space: pre-wrap;
      }

      .message.user {
        background-color: var(--chat-user);
        align-self: flex-end;
        border-bottom-right-radius: 2px;
      }

      .message.agent {
        background-color: var(--chat-agent);
        align-self: flex-start;
        border-bottom-left-radius: 2px;
      }

      .chat-input-area {
        padding: 20px;
        background-color: var(--bg-secondary);
        border-top: 1px solid var(--border-color);
        display: flex;
        gap: 12px;
      }

      .chat-input-area input {
        flex: 1;
      }

      .chat-input-area button {
        width: auto;
        padding: 0 24px;
      }

      .loading-text {
        color: var(--text-muted);
        font-style: italic;
      }

      /* Sidebar Mobile Overlay Backdrop Shield */
      .sidebar-overlay {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        background: rgba(15, 23, 42, 0.75);
        backdrop-filter: blur(4px);
        z-index: 40;
      }

      /* =====================================================================
         📱 MOBILE RESPONSIVE MEDIA BREAKPOINT (768px)
         ===================================================================== */
      @media (max-width: 768px) {
        .menu-toggle {
          display: block; /* Reveal mobile sidebar toggle engine button */
        }

        .sidebar {
          position: fixed;
          top: 0;
          left: 0;
          height: 100vh;
          transform: translateX(-100%); /* Stash sidebar out of screen boundaries */
          box-shadow: 10px 0 25px -5px rgba(0, 0, 0, 0.5);
        }

        .sidebar.open {
          transform: translateX(0); /* Slide sidebar back out smoothly on execution */
        }

        .sidebar-overlay.active {
          display: block;
        }

        .message {
          max-width: 90%; /* Offer bubbles more horizontal space on slim displays */
        }

        .chat-input-area {
          padding: 12px;
          gap: 8px;
        }

        .chat-input-area button {
          padding: 0 16px;
        }
      }
    </style>
  </head>
  <body>
    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <div class="sidebar" id="sidebarPanel">
      <h2>🐙 RepoIntel v2</h2>
      <p style="font-size: 0.85rem; color: var(--text-muted);">
        Polyglot Repository Analyzer Pipeline Gateway
      </p>
      <hr style="border: 0; border-top: 1px solid var(--border-color);" />

      <div class="input-group">
        <label for="repoUrl">Target GitHub URL</label>
        <input
          type="text"
          id="repoUrl"
          placeholder="https://github.com/username/repo"
        />
      </div>

      <button id="ingestBtn">Clone & Index Codebase</button>

      <div class="input-group">
        <label>Active Project Workspace:</label>
        <div id="workspaceStatus" class="status-box">
          No remote target loaded yet (Using local directory fallback).
        </div>
      </div>
    </div>

    <div class="chat-container">
      <div class="chat-header">
        <button class="menu-toggle" id="menuToggleBtn" aria-label="Toggle Navigation Menu">☰</button>
        <h3>💬 Codebase Session</h3>
      </div>

      <div class="messages-viewport" id="messagesViewport">
        <div class="message agent">
          Hello! Ingest a public GitHub repository using the left pane, or ask
          me questions about your current local source module directory
          immediately.
        </div>
      </div>

      <div class="chat-input-area">
        <input
          type="text"
          id="userQuery"
          placeholder="Ask a question about the code structure..."
          onkeydown="if(event.key === 'Enter') sendChatMessage()"
        />
        <button id="sendBtn" onclick="sendChatMessage()">Send</button>
      </div>
    </div>

    <script>
      const API_BASE = `${window.location.origin}/api`;
      const ingestBtn = document.getElementById("ingestBtn");
      const sendBtn = document.getElementById("sendBtn");
      const repoUrlInput = document.getElementById("repoUrl");
      const userQueryInput = document.getElementById("userQuery");
      const viewport = document.getElementById("messagesViewport");
      const workspaceStatus = document.getElementById("workspaceStatus");

      // Mobile Interactivity Context UI Bindings
      const menuToggleBtn = document.getElementById("menuToggleBtn");
      const sidebarPanel = document.getElementById("sidebarPanel");
      const sidebarOverlay = document.getElementById("sidebarOverlay");

      // Toggle drawer state
      function toggleMobileSidebar() {
        sidebarPanel.classList.toggle("open");
        sidebarOverlay.classList.toggle("active");
      }

      menuToggleBtn.addEventListener("click", toggleMobileSidebar);
      sidebarOverlay.addEventListener("click", toggleMobileSidebar);

      // --- HANDLER: INGEST GIT REPOSITORY ---
      ingestBtn.addEventListener("click", async () => {
        const url = repoUrlInput.value.trim();
        if (!url) {
          alert("Please drop a valid repository web address first!");
          return;
        }

        ingestBtn.disabled = true;
        ingestBtn.innerText = "Cloning & Vectorizing...";
        workspaceStatus.innerHTML =
          "<span class='loading-text'>Running Tree-Sitter AST extractions...</span>";

        try {
          const response = await fetch(`${API_BASE}/ingest`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ repo_url: url }),
          });

          const data = await response.json();
          if (response.ok) {
            workspaceStatus.innerHTML = `<span style="color: var(--accent);">✅ Active:</span><br>${data.workspace_path}`;
            appendMessage(
              "agent",
              `Successfully finished processing target repository:\n${url}\n\nThe full index has been refreshed. What code abstractions would you like to parse?`,
            );
            // Auto-close sidebar panel drawer upon successful repository ingest on mobile displays
            if(window.innerWidth <= 768) toggleMobileSidebar();
          } else {
            throw new Error(data.detail || "Ingestion workflow error.");
          }
        } catch (err) {
          workspaceStatus.innerHTML = `<span style="color: #f87171;">❌ Failed:</span><br>${err.message}`;
          alert(`Pipeline connection failure: ${err.message}`);
        } finally {
          ingestBtn.disabled = false;
          ingestBtn.innerText = "Clone & Index Codebase";
        }
      });

      // --- HANDLER: SEND INTERACTIVE CHAT MESSAGE ---
      async function sendChatMessage() {
        const query = userQueryInput.value.trim();
        if (!query || sendBtn.disabled) return;

        appendMessage("user", query);
        userQueryInput.value = "";

        const loadingId = appendMessage(
          "agent",
          "Thinking... running code graph semantic trace...",
        );
        sendBtn.disabled = true;

        try {
          const response = await fetch(`${API_BASE}/chat`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ message: query }),
          });

          const data = await response.json();
          const loadingElement = document.getElementById(loadingId);

          if (response.ok) {
            loadingElement.innerText = data.response;
          } else {
            throw new Error(
              data.detail ||
                `Server dropped transaction with status code: ${response.status}`,
            );
          }
        } catch (err) {
          const loadingElement = document.getElementById(loadingId);
          if (loadingElement) {
            loadingElement.innerHTML = `<span style="color: #f87171; font-weight: bold;">⚠️ Pipeline Route Crashed:</span><br><pre style="background: #000; padding: 10px; border-radius: 4px; font-family: monospace; font-size: 0.8rem; margin-top: 5px; overflow-x: auto;">${err.message}</pre>`;
          }
        } finally {
          sendBtn.disabled = false;
        }
      }

      // --- HELPER: RENDER ELEMENTS INTO SCREEN VIEWPORT ---
      function appendMessage(sender, text) {
        const msgBlock = document.createElement("div");
        const uniqueId =
          "msg-" + Date.now() + "-" + Math.floor(Math.random() * 1000);

        msgBlock.className = `message ${sender}`;
        msgBlock.id = uniqueId;
        msgBlock.innerText = text;

        viewport.appendChild(msgBlock);
        viewport.scrollTop = viewport.scrollHeight;

        return uniqueId;
      }
    </script>
  </body>
</html>
